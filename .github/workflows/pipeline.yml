name: Terraform App Service Pipeline

on:
  workflow_dispatch:

jobs:

  # ---------------- DEV ----------------
  dev:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
      - run: terraform validate
      - run: terraform plan -var-file=../env/dev.tfvars
      - run: terraform apply -auto-approve -var-file=../env/dev.tfvars

  # ---------------- STAGING APPLY (approval) ----------------
  staging:
    needs: dev
    runs-on: ubuntu-latest
    environment: staging

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
      - run: terraform plan -var-file=../env/staging.tfvars
      - run: terraform apply -auto-approve -var-file=../env/staging.tfvars

  # ---------------- PROD APPLY (approval) ----------------
  prod:
    needs: staging
    runs-on: ubuntu-latest
    environment: prod

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
      - run: terraform plan -var-file=../env/prod.tfvars
      - run: terraform apply -auto-approve -var-file=../env/prod.tfvars
